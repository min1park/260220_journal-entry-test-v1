<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 입력 - GrowMe Apps</title>
    <script src="/auth/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .lock-icon { font-size: 3rem; margin-bottom: 16px; }
        h2 { font-size: 1.4rem; margin-bottom: 8px; color: #333; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { position: relative; margin-bottom: 16px; }
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #1a73e8; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .error {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }
        .expired-msg {
            background: #fff3e0;
            color: #e65100;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1a73e8;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon">🔒</div>
        <h2>비밀번호 입력</h2>
        <p class="subtitle">이 앱은 비밀번호가 필요합니다</p>
        <div id="expired-box" class="expired-msg" style="display:none;">
            이번 달 비밀번호가 아직 설정되지 않았습니다.<br>관리자에게 문의하세요.
        </div>
        <div id="login-form">
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호를 입력하세요" autofocus>
            </div>
            <button class="btn" onclick="checkPassword()">확인</button>
            <p id="error" class="error">비밀번호가 올바르지 않습니다.</p>
        </div>
        <a href="/" class="back-link">← 메인으로 돌아가기</a>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var isExpired = params.get('expired') === '1';

        if (isExpired) {
            document.getElementById('expired-box').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
        }

        async function sha256(text) {
            var encoder = new TextEncoder();
            var data = encoder.encode(text);
            var hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(function(b) {
                return b.toString(16).padStart(2, '0');
            }).join('');
        }

        async function checkPassword() {
            var password = document.getElementById('password').value;
            if (!password) return;

            var hash = await sha256(password);
            var config = window.AUTH_CONFIG;

            if (hash === config.passwordHash) {
                // 인증 성공 → localStorage에 저장
                localStorage.setItem('growme_auth_' + config.validMonth, config.passwordHash);
                // 원래 페이지로 복귀
                var returnUrl = params.get('return') || '/';
                window.location.href = returnUrl;
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
